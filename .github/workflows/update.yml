name: Update Comics RSS Feed

on:
  schedule:
    # Daily at midnight (UTC+8 → 16:00 UTC)
    - cron: "0 16 * * *"
  workflow_dispatch:   # Manual trigger if needed

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v6

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 feedgen

      # 4️⃣ Run scraper
      - name: Run scraper
        run: python scrape.py

      # 5️⃣ Commit and push updated RSS feed
      - name: Commit and push comics.xml
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add comics.xml
          git commit -m "chore(feed): update comics.xml" || true
          git push